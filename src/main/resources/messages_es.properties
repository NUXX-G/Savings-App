metodo.kakeibo.descripcion=Método japonés de gestión del dinero. Anota todos tus ingresos y gastos a mano, reflexiona sobre tus hábitos cada mes y decide conscientemente en qué quieres gastar.
metodo.cincuenta_treinta_veinte.descripcion=Divide tus ingresos netos en tres bloques: 50% para necesidades básicas, 30% para caprichos y ocio, y 20% destinado al ahorro.
metodo.pay_yourself_first.descripcion=Aparta un porcentaje fijo de tu ingreso nada más cobrar, antes de gastar en nada más.
metodo.setenta_veinte_diez.descripcion=Reparte tus ingresos en tres partes: 70% gastos del día a día, 20% ahorro, y 10% inversión o donaciones.
metodo.zero_based_budget.descripcion=Asigna cada euro de tu ingreso a un propósito concreto hasta que ingresos menos gastos sea igual a cero.